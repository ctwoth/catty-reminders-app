name:  Continuous Integration (CI)

on:
  push:
    branches:
      - lab4_*
  pull_request:
    branches:
      - lab4_*
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Start server
        run: |
          nohup uvicorn app.main:app --port 8181 --host 127.0.0.1 &
          sleep 5

      - name: Test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml || true

      - name: Archive test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image name (lowercase)
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}
